name: Build

# Builds run on demand (workflow_dispatch), or automatically when a canonical
# release tag is pushed (v3.2.6 builds; pre-release tags like v3.2.6-alpha.1
# are skipped by the job-level condition below).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  JDK_ROOT: https://cdn.azul.com/zulu/bin
  JAVA_VERSION: zulu8.78.0.19-ca-jdk8.0.412

jobs:
  build:
    # On-demand runs always build; tag pushes only build canonical (non-pre-release) versions
    if: github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-')
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-x64
            os: macos-latest
            args: --mac --x64
          - name: mac-arm64
            os: macos-latest
            args: --mac --arm64
          - name: win-x64
            os: windows-latest
            args: --win --x64
          - name: linux-x64
            os: ubuntu-latest
            args: --linux --x64

    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack (Yarn 4)
        shell: bash
        run: |
          # The Windows runner image ships a global Yarn 1 (C:\npm\prefix) that
          # shadows the Corepack shim on PATH; remove it so Yarn 4 is used.
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            npm uninstall -g yarn
          fi
          corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Cache bundled JRE
        uses: actions/cache@v6
        with:
          path: build_resources/jre
          key: jre-${{ matrix.name }}-${{ env.JAVA_VERSION }}

      # The bundled JRE lives in build_resources/jre/<platform>-<arch>, which is
      # gitignored, and must be in place before `yarn install` (the postinstall
      # script expects it).
      - name: Download Zulu JRE (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ matrix.name }}" in
            mac-x64)   TARGET="${JAVA_VERSION}-macosx_x64";     DEST=mac-x64 ;;
            mac-arm64) TARGET="${JAVA_VERSION}-macosx_aarch64"; DEST=mac-arm64 ;;
            linux-x64) TARGET="${JAVA_VERSION}-linux_x64";      DEST=linux-x64 ;;
          esac

          if [[ -f "build_resources/jre/${DEST}/bin/java" ]]; then
            echo "Using cached JRE at build_resources/jre/${DEST}"
            exit 0
          fi

          mkdir -p build_resources/jre
          curl -fsSL -o "${RUNNER_TEMP}/jdk.tar.gz" "${JDK_ROOT}/${TARGET}.tar.gz"
          tar xf "${RUNNER_TEMP}/jdk.tar.gz" -C "${RUNNER_TEMP}"

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            cp -R "${RUNNER_TEMP}/${TARGET}/zulu-8.jdk/Contents/Home/jre" "build_resources/jre/${DEST}"
          else
            cp -R "${RUNNER_TEMP}/${TARGET}/jre" "build_resources/jre/${DEST}"
          fi

          # Read-only files break the app's auto-update process
          chmod -R u+w "build_resources/jre/${DEST}"
          "build_resources/jre/${DEST}/bin/java" -version 2>&1 | head -3 || true

      - name: Download Zulu JRE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $target = "$env:JAVA_VERSION-win_x64"
      
          if (Test-Path "build_resources/jre/win-x64/bin/java.exe") {
            Write-Host "Using cached JRE at build_resources/jre/win-x64"
            exit 0
          }
      
          New-Item -ItemType Directory -Force -Path build_resources/jre | Out-Null
          Invoke-WebRequest -Uri "$env:JDK_ROOT/$target.zip" -OutFile "$env:RUNNER_TEMP\jdk.zip"
          Expand-Archive "$env:RUNNER_TEMP\jdk.zip" -DestinationPath "$env:RUNNER_TEMP"
          
          # Find the extracted JDK directory and copy its jre subfolder
          $jdkDir = Get-ChildItem "$env:RUNNER_TEMP" -Directory -Filter "*zulu*" | Select-Object -First 1
          if ($jdkDir -and (Test-Path "$($jdkDir.FullName)\jre")) {
            Copy-Item -Recurse "$($jdkDir.FullName)\jre" "build_resources/jre/win-x64"
          } else {
            throw "JRE not found in extracted archive"
          }
          
          & "build_resources/jre/win-x64/bin/java.exe" -version

      # SSL.com eSigner CodeSignTool, used by scripts/esigner-sign.js (the
      # electron-builder custom sign hook) to cloud-sign Windows binaries.
      # The Windows download bundles its own Java runtime.
      - name: Install CodeSignTool (Windows signing)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile "$env:RUNNER_TEMP\CodeSignTool.zip"
          Expand-Archive "$env:RUNNER_TEMP\CodeSignTool.zip" -DestinationPath "$env:RUNNER_TEMP\CodeSignTool"
          $bat = Get-ChildItem -Path "$env:RUNNER_TEMP\CodeSignTool" -Recurse -Filter CodeSignTool.bat | Select-Object -First 1
          if (-not $bat) { throw "CodeSignTool.bat not found in downloaded archive" }
          "CODE_SIGN_TOOL_PATH=$($bat.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: yarn install

      - name: Build stylesheets
        run: yarn sass:build

      - name: Build application
        shell: bash
        env:
          # macOS code signing + notarization; all optional. Without CSC_LINK the
          # build is unsigned, and scripts/notarize.js skips notarization unless
          # APPLEID, APPLEIDPASS and APPLETEAMID are all set.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLETEAMID: ${{ secrets.APPLETEAMID }}
          # Windows code signing via SSL.com eSigner; all optional. Without
          # these, scripts/esigner-sign.js skips signing (unsigned build).
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: yarn electron-builder ${{ matrix.args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/*.yml

  # When a canonical release tag triggered the build, collect the installers
  # into a draft GitHub release for review before publishing.
  release:
    name: Draft GitHub release
    needs: build
    if: github.event_name == 'push' && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        # Channel .yml files are excluded here: the two mac jobs each produce a
        # latest-mac.yml so the names collide, and update metadata is published
        # through the app's own update host rather than GitHub releases. They
        # remain available in the per-platform workflow artifacts.
        run: |
          shopt -s nullglob
          files=(artifacts/*/*.dmg artifacts/*/*.zip artifacts/*/*.exe artifacts/*/*.AppImage artifacts/*/*.blockmap)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            "${files[@]}"
